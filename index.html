<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>ASOBLE都道府県シルエットクイズ</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="app" class="app">

    <!-- 背景 -->
    <div class="bg"></div>

    <!-- Header -->
    <header class="topbar">
      <button id="btnOpenDrawer" class="btnIcon">⚙</button>
      <div class="brand">ASOBLE 都道府県シルエットクイズ</div>
      <div class="spacer"></div>
    </header>

    <main class="main">

      <!-- タイトル -->
      <section id="screenTitle" class="screen screenActive">
        <h1 class="title">
          <span class="titleSmall">ASOBLE</span>
          <span class="titleBig">都道府県<br/>シルエットクイズ</span>
        </h1>
        <button id="btnStart" class="btnPrimary">はじめる</button>
      </section>

      <!-- ゲーム -->
      <section id="screenGame" class="screen" hidden>

        <!-- 問題 -->
        <div class="question">
          <div id="qText" class="qText"></div>
        </div>

        <!-- ステージ -->
        <div class="stage">

          <!-- 地図（SVG） -->
          <div class="mapWrap">
            <object id="japanMap" type="image/svg+xml" data="map/japan.svg"></object>
          </div>

          <!-- 選択肢 -->
          <div id="grid" class="grid"></div>

        </div>

        <!-- 結果 -->
        <div id="result" class="result" hidden>
          <div class="resultCard">
            <div id="resLine1" class="resLine1"></div>
            <div id="resName" class="resName"></div>
            <div id="resKana" class="resKana"></div>
            <div id="resLine2" class="resLine2"></div>
            <button id="btnNext" class="btnPrimary small">つぎへ</button>
          </div>
        </div>

      </section>

    </main>

    <footer class="footer">
      <span id="badge" class="badge">ready</span>
    </footer>

  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
