<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>ASOBLE都道府県シルエットクイズ</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="app" class="app">

    <div class="bg"></div>

    <header class="topbar">
      <button id="btnOpenDrawer" class="btnIcon" type="button" aria-label="settings">⚙</button>
      <div class="brand">ASOBLE 都道府県シルエットクイズ</div>
      <div class="spacer"></div>
    </header>

    <main class="main">
      <section id="screenTitle" class="screen screenActive">
        <h1 class="title">
          <span class="titleSmall">ASOBLE</span>
          <span class="titleBig">都道府県<br>シルエットクイズ</span>
        </h1>
        <button id="btnStart" class="btnPrimary">はじめる</button>
      </section>

      <section id="screenGame" class="screen" hidden>
        <div class="question">
          <div id="qText" class="qText"></div>
        </div>

        <div class="stage">
          <div id="qHero" class="qHero" aria-hidden="true"></div>

          <div id="grid" class="grid"></div>

          <!-- 結果ポップアップ -->
          <div id="result" class="result" hidden>
            <div class="resultCard">
              <div id="resLine1" class="resLine1"></div>
              <div id="resName" class="resName"></div>
              <div id="resKana" class="resKana"></div>
              <div id="resLine2" class="resLine2"></div>
              <button id="btnNext" class="btnPrimary small" type="button">つぎへ</button>
            </div>
          </div>

          <!-- 地図演出ステップ -->
          <div id="mapStage" class="mapStage" hidden>
            <div class="mapStageCard">
              <div id="mapLead" class="mapLead">ココだよ！</div>

              <div class="mapObjectWrap">
                <object
                  id="japanMap"
                  class="japanMap"
                  type="image/svg+xml"
                  data="map/japan.svg"
                  aria-label="日本地図">
                </object>
              </div>

              <div id="mapPrefName" class="mapPrefName" hidden></div>

              <button id="btnMapNext" class="btnPrimary small" type="button">
                つぎのもんだいへ
              </button>
            </div>
          </div>
        </div>
      </section>
    </main>

    <footer class="footer">
      <span id="badge" class="badge">ready</span>
    </footer>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
